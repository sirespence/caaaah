<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="shell">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">ATOM</div>
    <div class="tb-sep"></div>
    <div class="addr-wrap">
      <span class="addr-icon">⌕</span>
      <input class="addr-input" id="addr"
        placeholder="Search or enter a URL..."
        onkeydown="if(event.key==='Enter') go(this.value)">
      <div class="addr-go" onclick="go(document.getElementById('addr').value)">↵</div>
    </div>
    <div class="tb-right">
      <div class="status-pill">
        <div class="sdot" id="sdot"></div>
        <span class="stext" id="stext">Ready</span>
      </div>
      <div class="panic-btn" title="Panic  ]" onclick="panic()">
        <span>⚑</span>
        <span class="panic-label">Panic</span>
      </div>
    </div>
  </div>

  <div class="body-row">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sib on" id="sib-home" onclick="page('home')">
        <div class="sib-ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        </div>
        <div class="sib-lbl">Home</div>
      </div>
      <div class="sib" id="sib-games" onclick="page('games')">
        <div class="sib-ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="4"/><path d="M6 12h4m-2-2v4"/><circle cx="17" cy="11" r="1" fill="currentColor"/><circle cx="17" cy="14" r="1" fill="currentColor"/></svg>
        </div>
        <div class="sib-lbl">Games</div>
      </div>
      <div class="sib" id="sib-browse" onclick="page('browse')">
        <div class="sib-ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <div class="sib-lbl">Browse</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- HOME PAGE -->
      <div id="pg-home">
        <div class="home-content">
          <div class="home-badge">v2 · Proxy + Cloud</div>
          <h1 class="home-title">Welcome to<br><em>ATOM</em></h1>
          <p class="home-sub">Roblox · Proxy · Web · Space</p>
          <div class="hero-wrap">
            <span class="hero-icon">⌕</span>
            <input class="hero-input" id="hero"
              placeholder="Search or enter a URL to proxy..."
              onkeydown="if(event.key==='Enter') go(this.value)">
            <button class="hero-go" onclick="go(document.getElementById('hero').value)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
            </button>
          </div>
          <div class="home-shortcuts">
            <div class="shortcut" onclick="page('games')">
              <span class="sc-ico">◈</span> Browse Games
            </div>
            <div class="shortcut" onclick="goNowGG()">
              <span class="sc-ico">☁</span> now.gg Roblox
            </div>
            <div class="shortcut" onclick="go('https://search.brave.com')">
              <span class="sc-ico">🦁</span> Brave Search
            </div>
          </div>
          <div class="hero-hint">Enter to proxy &nbsp;·&nbsp; ] panic &nbsp;·&nbsp; Esc close</div>
        </div>
      </div>

      <!-- GAMES PAGE -->
      <div id="pg-games">
        <div class="page-header">
          <h2 class="page-title">Games</h2>
          <div class="launch-toggle">
            <span class="lt-label">Launch via</span>
            <div class="lt-opts">
              <button class="lt-btn active" id="lt-nowgg" onclick="setLaunchMode('nowgg')">☁ now.gg</button>
              <button class="lt-btn" id="lt-proxy" onclick="setLaunchMode('proxy')">⚡ Proxy</button>
            </div>
          </div>
        </div>
        <div class="sec-head"><span>🔥 Popular</span></div>
        <div class="grid" id="g-pop"></div>
        <div class="sec-head"><span>⚔️ Action</span></div>
        <div class="grid" id="g-act"></div>
        <div class="sec-head"><span>🎭 Roleplay</span></div>
        <div class="grid" id="g-rp"></div>
        <div class="sec-head"><span>🏆 Classic</span></div>
        <div class="grid" id="g-classic"></div>
      </div>

      <!-- BROWSE PAGE -->
      <div id="pg-browse">
        <div class="page-header">
          <h2 class="page-title">Browse</h2>
        </div>
        <div class="sec-head"><span>🎮 Roblox</span></div>
        <div class="blist" id="b-roblox"></div>
        <div class="sec-head"><span>🌐 Web</span></div>
        <div class="blist" id="b-web"></div>
      </div>

    </div>
  </div>
</div>

<!-- PROXY FRAME -->
<div id="frame">
  <div class="fbar">
    <div class="fbar-left">
      <div class="tl-red" onclick="closeFrame()" title="Close"></div>
      <div class="ftitle" id="ftitle">—</div>
    </div>
    <div class="furl-wrap">
      <span class="furl-icon">🔒</span>
      <div class="furl" id="furl"></div>
    </div>
    <div class="fbar-right">
      <div class="fbar-btn" onclick="closeFrame()" title="Close (Esc)">✕ Close</div>
    </div>
  </div>
  <iframe id="viewer" src="about:blank" allowfullscreen
    allow="fullscreen; autoplay; clipboard-read; clipboard-write"
    sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals allow-pointer-lock allow-top-navigation-by-user-activation">
  </iframe>
</div>

<!-- GAME LAUNCH MODAL -->
<div id="modal" class="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-emoji" id="modal-emoji"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-players" id="modal-players"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-primary" id="modal-nowgg">
        <span>☁</span> Play on now.gg
        <small>Cloud · No download</small>
      </button>
      <button class="modal-btn modal-btn-secondary" id="modal-proxy">
        <span>⚡</span> UV Proxy
        <small>Local proxy</small>
      </button>
    </div>
    <div class="modal-close" onclick="closeModal()">✕</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/app.js"></script>
</body>
</html>
