<link rel="stylesheet" href="/style.css">
</head>
<body>

    <symbol id="ico-reddit" viewBox="0 0 24 24"><circle cx="12" cy="14" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="19" cy="5" r="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 8V5.5M5 11c-.8-.8-1-2-.3-2.8s2-.8 2.8 0M19 11c.8-.8 1-2 .3-2.8s-2-.8-2.8 0" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="9.5" cy="13.5" r=".8" fill="currentColor"/><circle cx="14.5" cy="13.5" r=".8" fill="currentColor"/><path d="M9.5 16.5c.7.7 1.5 1 2.5 1s1.8-.3 2.5-1" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></symbol>

    <symbol id="ico-game" viewBox="0 0 24 24"><rect x="2" y="8" width="20" height="10" rx="4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M6 13h4M8 11v4M15 12h.01M17 14h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></symbol>

    <symbol id="ico-chess" viewBox="0 0 24 24"><path d="M9 21h6M8 21v-2a4 4 0 018 0v2M12 15V9M9 9h6M10 9V6h4v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
    <symbol id="ico-puzzle" viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6v2a2 2 0 01-2 2H3m6-4v6m12-6h-4a2 2 0 00-2 2v4m6-6v2a2 2 0 01-2 2h-4m6-4v6M3 9v4m0 4v-4m0 4h2a2 2 0 012 2v2m-4-4h4m8-4v4m0 4v-4m0 4h-2a2 2 0 01-2 2v2m4-4h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
    <symbol id="ico-twitch" viewBox="0 0 24 24"><path d="M3 2l-1 4v14h5v3h3l3-3h4l5-5V2H3zM20 14l-3 3h-4l-3 3v-3H6V4h14v10z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 7v5M15 7v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></symbol>
    <symbol id="ico-camera" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2v11z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>

    <symbol id="ico-pin" viewBox="0 0 24 24"><path d="M12 22s-7-6.5-7-12a7 7 0 0114 0c0 5.5-7 12-7 12z" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>

    <symbol id="ico-cal" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/><circle cx="8" cy="15" r="1" fill="currentColor"/><circle cx="12" cy="15" r="1" fill="currentColor"/><circle cx="16" cy="15" r="1" fill="currentColor"/></symbol>
    <symbol id="ico-poki" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M9 9h.01M15 9h.01M9 15c1 1.5 5 1.5 6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></symbol>

</svg>

<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">ATOM</div>
    <div class="top-divider"></div>
    <div class="addr-bar">
      <svg class="addr-ico"><use href="#ico-lock"/></svg>
      <input class="addr-input" id="addr"
        placeholder="search or enter url"
        onkeydown="if(event.key==='Enter') go(this.value)">
      <button class="addr-btn" onclick="refreshFrame()" title="Refresh">
        <svg><use href="#ico-refresh"/></svg>
      </button>
      <button class="addr-btn addr-go" onclick="go(document.getElementById('addr').value)" title="Go">
        <svg><use href="#ico-arrow-right"/></svg>
      </button>
    </div>
    <div class="top-right">
      <div class="status-row">
        <div class="sdot" id="sdot"></div>
        <span id="stext">ready</span>
      </div>
      <div class="ctrl-group">
        <button class="ctrl-btn" title="Minimize"><svg><use href="#ico-minus"/></svg></button>
        <button class="ctrl-btn" title="Maximize"><svg><use href="#ico-square"/></svg></button>
        <button class="ctrl-btn ctrl-close" onclick="panic()" title="Panic  ]"><svg><use href="#ico-x"/></svg></button>
      </div>
    </div>
  </header>

  <!-- BODY -->
  <div class="body-row">

    <!-- SIDEBAR -->
    <nav class="sidebar">
      <button class="nav-btn active" id="sib-home" onclick="page('home')" title="Home">
        <svg><use href="#ico-home"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" id="sib-browse" onclick="page('browse')" title="Sites">
        <svg><use href="#ico-globe"/></svg>
        <span>Sites</span>
      </button>
      <button class="nav-btn" id="sib-history" onclick="page('history')" title="Recent">
        <svg><use href="#ico-clock"/></svg>
        <span>Recent</span>
      </button>
      <div class="nav-spacer"></div>
      <button class="nav-btn nav-panic" onclick="panic()" title="Panic  ]">
        <svg><use href="#ico-flag"/></svg>
        <span>Panic</span>
      </button>
    </nav>

    <!-- CONTENT -->
    <main class="content">

      <!-- HOME -->
      <div id="pg-home" class="page page-home">
        <div class="home-inner">
          <div class="home-wordmark">
            <div class="wordmark-line"></div>
            <span>ATOM</span>
            <div class="wordmark-line"></div>
          </div>
          <p class="home-tag">proxy browser</p>

          <div class="search-row">
            <svg class="search-ico"><use href="#ico-search"/></svg>
            <input class="search-input" id="hero"
              placeholder="search or enter a url..."
              onkeydown="if(event.key==='Enter') go(this.value)">
            <button class="search-go" onclick="go(document.getElementById('hero').value)">
              <svg><use href="#ico-arrow-right"/></svg>
            </button>
          </div>

          <div class="tile-grid">
            <button class="tile" onclick="go('https://www.roblox.com','Roblox')">
              <svg class="tile-ico"><use href="#ico-roblox"/></svg>
              <span class="tile-name">Roblox</span>
            </button>
            <button class="tile" onclick="go('https://search.brave.com','Brave Search')">
              <svg class="tile-ico"><use href="#ico-brave"/></svg>
              <span class="tile-name">Search</span>
            </button>
            <button class="tile" onclick="go('https://www.youtube.com','YouTube')">
              <svg class="tile-ico"><use href="#ico-youtube"/></svg>
              <span class="tile-name">YouTube</span>
            </button>
            <button class="tile" onclick="go('https://discord.com/app','Discord')">
              <svg class="tile-ico"><use href="#ico-discord"/></svg>
              <span class="tile-name">Discord</span>
            </button>
            <button class="tile" onclick="go('https://www.reddit.com','Reddit')">
              <svg class="tile-ico"><use href="#ico-reddit"/></svg>
              <span class="tile-name">Reddit</span>
            </button>
            <button class="tile" onclick="go('https://chat.openai.com','ChatGPT')">
              <svg class="tile-ico"><use href="#ico-ai"/></svg>
              <span class="tile-name">ChatGPT</span>
            </button>
            <button class="tile" onclick="go('https://open.spotify.com','Spotify')">
              <svg class="tile-ico"><use href="#ico-music"/></svg>
              <span class="tile-name">Spotify</span>
            </button>
            <button class="tile" onclick="go('https://www.twitch.tv','Twitch')">
              <svg class="tile-ico"><use href="#ico-twitch"/></svg>
              <span class="tile-name">Twitch</span>
            </button>
          </div>

          <p class="home-hint">enter to proxy &ensp;·&ensp; ] panic &ensp;·&ensp; esc close</p>
        </div>
      </div>

      <!-- SITES -->
      <div id="pg-browse" class="page page-scroll" style="display:none">
        <div class="pg-header">
          <h2>Sites</h2>
          <p>All traffic routed through UV proxy</p>
        </div>

        <div class="section-label">Gaming</div>
        <div class="site-list" id="b-gaming"></div>

        <div class="section-label">Web</div>
        <div class="site-list" id="b-web"></div>

        <div class="section-label">Media</div>
        <div class="site-list" id="b-media"></div>

        <div class="section-label">Productivity</div>
        <div class="site-list" id="b-useful"></div>
      </div>

      <!-- HISTORY -->
      <div id="pg-history" class="page page-scroll" style="display:none">
        <div class="pg-header">
          <h2>Recent</h2>
          <p>Your proxied session history</p>
        </div>
        <div id="history-list"></div>
        <div id="history-empty" class="empty-state">
          <svg><use href="#ico-clock"/></svg>
          <span>No history yet</span>
          <small>Sites you visit will appear here</small>
        </div>
      </div>

    </main>
  </div>

  <!-- STATUSBAR -->
  <footer class="statusbar">
    <span>ATOM · UV Proxy</span>
    <div class="sb-divider"></div>
    <span id="sb-info" class="sb-mid">idle</span>
    <div class="sb-divider"></div>
    <span class="sb-right">] panic &ensp; esc close</span>
  </footer>

</div>

<!-- FRAME -->
<div id="frame">
  <div class="frame-bar">
    <div class="ftl-group">
      <button class="ftl ftl-red" onclick="closeFrame()"></button>
      <button class="ftl ftl-yellow"></button>
      <button class="ftl ftl-green"></button>
    </div>
    <div class="frame-url-bar">
      <svg><use href="#ico-lock"/></svg>
      <span class="frame-title" id="ftitle">—</span>
      <span class="frame-sep">·</span>
      <span class="frame-url" id="furl">—</span>
    </div>
    <button class="frame-close" onclick="closeFrame()">
      <svg><use href="#ico-x-mark"/></svg>
      close
    </button>
  </div>
  <div class="frame-loader" id="frame-loader">
    <div class="loader-ring"></div>
    <span id="loader-text">connecting</span>
  </div>
  <iframe id="viewer" src="about:blank" allowfullscreen
    allow="fullscreen; autoplay; clipboard-read; clipboard-write"
    sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals allow-pointer-lock allow-top-navigation-by-user-activation">
  </iframe>
</div>

<div class="toast" id="toast"></div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/app.js"></script>
</body>
</html>
